```
<div id="setup-screen">
    <p class="instructions">Choisis tes tables de travail :</p>
    <div class="selection-menu">
        <div class="table-btn" onclick="toggleTable(2)">x 2</div>
        <div class="table-btn" onclick="toggleTable(3)">x 3</div>
        <div class="table-btn" onclick="toggleTable(4)">x 4</div>
        <div class="table-btn" onclick="toggleTable(5)">x 5</div>
        <div class="table-btn" onclick="toggleTable(6)">x 6</div>
        <div class="table-btn" onclick="toggleTable(7)">x 7</div>
        <div class="table-btn" onclick="toggleTable(8)">x 8</div>
        <div class="table-btn" onclick="toggleTable(9)">x 9</div>
        <div class="table-btn" onclick="toggleTable(10)">x 10</div>
    </div>
    <button class="btn-start" onclick="startGame()" id="start-btn" disabled>Commencer l'entraînement</button>
    <br>
    <button class="reset-btn" onclick="resetAll()">Effacer toute la progression</button>

    <div id="flashcard" class="card">?</div>

    <div class="input-row">
        <input id="answer-input" type="number" inputmode="numeric" placeholder="?" autocomplete="off" />
        <button id="btn-validate" onclick="checkAnswer()">OK</button>

        <div class="box"><h4>B4</h4><span id="b4">0</span></div>

    <button class="link-btn" onclick="backToMenu()">Changer de tables</button>

```

</div>

<script>
    let deck = JSON.parse(localStorage.getItem('multipliLeitnerV3')) || [];
    let selectedTables = [];
    let currentCard = null;

    const BOX_WEIGHTS = { 1: 8, 2: 4, 3: 2, 4: 1 };

    function toggleTable(n) {
        const idx = selectedTables.indexOf(n);
        if (idx > -1) selectedTables.splice(idx, 1);
        else selectedTables.push(n);
        renderSelectionButtons();
        document.getElementById('start-btn').disabled = selectedTables.length === 0;
    }

    function renderSelectionButtons() {
        document.querySelectorAll('.table-btn').forEach(btn => {
            const num = parseInt(btn.innerText.replace('x ', ''));
            btn.classList.toggle('active', selectedTables.includes(num));
        });
    }

    function startGame() {
        selectedTables.forEach(t => {
            for (let i = 1; i <= 10; i++) {
                if (!deck.find(c => c.a === t && c.b === i)) {
                    deck.push({ a: t, b: i, box: 1 });
                }
            }
        });
        save();
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        nextQuestion();
    }

    function save() {
        localStorage.setItem('multipliLeitnerV3', JSON.stringify(deck));
        updateUI();
    }

    function updateUI() {
        const activeDeck = deck.filter(c => selectedTables.includes(c.a));
        for (let i = 1; i <= 5; i++) {
            document.getElementById(`b${i}`).innerText = activeDeck.filter(c => c.box === i).length;
        }
    }

    function nextQuestion() {
        const activeDeck = deck.filter(c => selectedTables.includes(c.a) && c.box < 5);

        if (activeDeck.length === 0) {
            document.getElementById('flashcard').innerText = "FINI ! ✨";
            document.getElementById('flashcard').style.fontSize = "2.5rem";
            document.getElementById('flashcard').className = 'card';
            document.getElementById('feedback').innerHTML = '<p class="instructions">Toutes les tables choisies sont en Boîte 5 !</p>';
            document.getElementById('answer-input').classList.add('hidden');
            document.getElementById('btn-validate').classList.add('hidden');
            return;
        }

        const weightedPool = [];
        activeDeck.forEach(card => {
            const weight = BOX_WEIGHTS[card.box] || 1;
            for (let i = 0; i < weight; i++) weightedPool.push(card);
        });
        currentCard = weightedPool[Math.floor(Math.random() * weightedPool.length)];

        const input = document.getElementById('answer-input');
        const flashcard = document.getElementById('flashcard');
        flashcard.innerText = `${currentCard.a} × ${currentCard.b}`;
        flashcard.style.fontSize = "3.5rem";
        flashcard.className = 'card';
        input.value = '';
        input.disabled = false;
        input.classList.remove('hidden');
        document.getElementById('btn-validate').disabled = false;
        document.getElementById('btn-validate').classList.remove('hidden');
        document.getElementById('feedback').innerHTML = '<p class="instructions">Tape ta réponse et appuie sur OK</p>';

        setTimeout(() => input.focus(), 100);
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input');
        const userAnswer = parseInt(input.value);
        if (isNaN(userAnswer)) return;

        const correctAnswer = currentCard.a * currentCard.b;
        const isCorrect = userAnswer === correctAnswer;

        input.disabled = true;
        document.getElementById('btn-validate').disabled = true;

        const flashcard = document.getElementById('flashcard');
        const feedback = document.getElementById('feedback');

        if (isCorrect) {
            flashcard.classList.add('correct');
            feedback.innerHTML = '<p class="feedback-msg correct">✅ Bravo !</p>';
            if (currentCard.box < 5) currentCard.box++;
            save();
            setTimeout(nextQuestion, 1000);
        } else {
            flashcard.classList.add('wrong');
            feedback.innerHTML = `
                <p class="feedback-msg wrong">❌ Faux ! La bonne réponse était <strong>${correctAnswer}</strong></p>
                <button class="btn-understood" onclick="handleWrong()">C'est compris</button>
            `;
        }
    }

    function handleWrong() {
        currentCard.box = 1;
        save();
        nextQuestion();
    }

    document.getElementById('answer-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') checkAnswer();
    });

    function backToMenu() {
        document.getElementById('setup-screen').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('hidden');
    }

    function resetAll() {
        if (confirm("Veux-tu vraiment recommencer à zéro et effacer toutes les boîtes ?")) {
            localStorage.removeItem('multipliLeitnerV3');
            deck = [];
            selectedTables = [];
            renderSelectionButtons();
            document.getElementById('start-btn').disabled = true;
        }
    }
</script>

</body>
