<!DOCTYPE html>

<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Champion des Tables</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        background: #f0f4f8;
        font-family: 'Segoe UI', sans-serif;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
    }

    /* Plein écran, centré */
    body {
        display: flex;
        justify-content: center;
        align-items: stretch;
    }

    .container {
        background: white;
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        height: 100%;
        height: 100dvh;
        padding: 12px 14px;
        overflow: hidden;
    }

    h1 {
        color: #2c3e50;
        font-size: 1.3rem;
        text-align: center;
        flex-shrink: 0;
        padding-bottom: 6px;
    }

    /* ── SETUP ── */
    #setup-screen {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
    }

    #setup-screen p {
        font-size: 0.85rem;
        color: #7f8c8d;
        text-align: center;
        margin-bottom: 8px;
        flex-shrink: 0;
    }

    .selection-menu {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 8px;
        background: #f8f9fa;
        border-radius: 12px;
        flex-shrink: 0;
    }

    .table-btn {
        padding: 10px 5px;
        border: 2px solid #3498db;
        border-radius: 10px;
        cursor: pointer;
        background: white;
        font-weight: bold;
        font-size: 0.9rem;
        transition: 0.2s;
        text-align: center;
    }
    .table-btn.active { background: #3498db; color: white; }

    .setup-footer {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding-top: 10px;
        flex-shrink: 0;
    }

    .btn-start {
        width: 100%; padding: 14px;
        font-size: 1rem; border: none;
        border-radius: 12px; cursor: pointer;
        font-weight: bold; background: #3498db; color: white;
    }
    .btn-start:disabled { background: #bdc3c7; cursor: default; }
    .reset-btn {
        background: none; color: #bdc3c7;
        font-size: 0.7rem; border: none; cursor: pointer;
    }

    /* ── GAME ── */
    #game-screen {
        display: flex;
        flex-direction: column;
        flex: 1;
        gap: 0;
        overflow: hidden;
    }

    /* Flashcard — taille flexible */
    .card {
        width: 100%;
        flex: 0 0 auto;
        min-height: 90px;
        max-height: 130px;
        background: #fff;
        border: 4px solid #3498db;
        border-radius: 14px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: clamp(2rem, 8vw, 3.2rem);
        font-weight: bold;
        margin: 6px 0;
        transition: border-color 0.3s;
        overflow: visible;
    }
    .card.correct { border-color: #2ecc71; }
    .card.wrong   { border-color: #e74c3c; }

    @keyframes shake {
        0%,100% { transform: translateX(0); }
        20%  { transform: translateX(-10px); }
        40%  { transform: translateX(10px); }
        60%  { transform: translateX(-6px); }
        80%  { transform: translateX(6px); }
    }
    @keyframes flyRight {
        0%   { transform: scale(1) translate(0,0); opacity: 1; }
        100% { transform: scale(0.12) translate(200px, 80px); opacity: 0; }
    }
    @keyframes flyLeft {
        0%   { transform: scale(1) translate(0,0); opacity: 1; }
        100% { transform: scale(0.12) translate(-200px, 80px); opacity: 0; }
    }
    .card.anim-shake     { animation: shake 0.45s ease; }
    .card.anim-fly-right { animation: flyRight 0.45s ease forwards; }
    .card.anim-fly-left  { animation: flyLeft 0.45s ease forwards; }

    /* Answer display */
    .answer-display {
        width: 100%;
        flex-shrink: 0;
        padding: 8px;
        font-size: clamp(1.4rem, 6vw, 2rem);
        font-weight: bold;
        border: 3px solid #3498db;
        border-radius: 12px;
        text-align: center;
        background: #f0f7ff;
        color: #2c3e50;
        letter-spacing: 2px;
        margin-bottom: 4px;
    }
    .answer-display.empty   { color: #bdc3c7; }
    .answer-display.correct { border-color: #2ecc71; background: #eafaf1; }
    .answer-display.wrong   { border-color: #e74c3c; background: #fdf0f0; }

    /* Feedback */
    .feedback {
        flex-shrink: 0;
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 4px;
    }
    .feedback-msg { font-size: 0.95rem; font-weight: bold; }
    .feedback-msg.correct { color: #2ecc71; }
    .feedback-msg.wrong   { color: #e74c3c; }
    .btn-understood {
        padding: 10px 20px; font-size: 0.9rem;
        border: none; border-radius: 12px;
        cursor: pointer; font-weight: bold;
        background: #e74c3c; color: white;
    }

    /* Numpad — prend l'espace restant */
    .numpad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        flex: 1;
        min-height: 0;
    }
    .num-btn {
        font-size: clamp(1.1rem, 5vw, 1.5rem);
        font-weight: bold;
        border: 2px solid #dde3ea;
        border-radius: 12px;
        cursor: pointer;
        background: white;
        color: #2c3e50;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.1s, transform 0.1s;
        user-select: none;
        min-height: 0;
    }
    .num-btn:active { background: #eaf2fb; transform: scale(0.93); }
    .num-btn.del { background: #fef3e8; border-color: #f5cba7; color: #e67e22; }
    .num-btn.del:active { background: #fde8cc; }
    .num-btn.ok  { background: #3498db; border-color: #2980b9; color: white; }
    .num-btn.ok:active  { background: #2980b9; }
    .num-btn.ok.disabled { background: #bdc3c7; border-color: #bdc3c7; cursor: default; }

    /* Buildings */
    .buildings {
        flex-shrink: 0;
        display: flex;
        justify-content: space-around;
        align-items: flex-end;
        padding: 6px 0 2px 0;
        border-top: 2px solid #f0f4f8;
        margin-top: 6px;
    }
    .building {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
        flex: 1;
    }
    .building .icon {
        font-size: clamp(1.2rem, 5vw, 1.6rem);
        line-height: 1;
        filter: grayscale(0.6) opacity(0.4);
        transition: transform 0.2s, filter 0.2s;
    }
    .building .count { font-size: 0.68rem; font-weight: bold; color: #aab; }
    .building .label { font-size: 0.52rem; color: #ccd; }
    .building.active .icon  { filter: none; transform: scale(1.25); }
    .building.active .count { color: #2c3e50; }
    .building.active .label { color: #7f8c8d; }

    @keyframes buildingPop {
        0%   { transform: scale(1.25); }
        45%  { transform: scale(1.65); }
        100% { transform: scale(1.25); }
    }
    .building.pulse .icon { animation: buildingPop 0.4s ease; }

    .game-footer {
        flex-shrink: 0;
        text-align: center;
        padding-top: 4px;
    }
    .link-btn {
        background: none; color: #3498db;
        font-size: 0.78rem; border: none;
        text-decoration: underline; cursor: pointer;
    }

    .hidden { display: none !important; }
</style>

</head>
<body>
<div class="container">
    <h1>Champion des Tables 🏆</h1>

<!-- SETUP -->
<div id="setup-screen">
    <p>Choisis tes tables de travail :</p>
    <div class="selection-menu">
        <div class="table-btn" onclick="toggleTable(2)">x 2</div>
        <div class="table-btn" onclick="toggleTable(3)">x 3</div>
        <div class="table-btn" onclick="toggleTable(4)">x 4</div>
        <div class="table-btn" onclick="toggleTable(5)">x 5</div>
        <div class="table-btn" onclick="toggleTable(6)">x 6</div>
        <div class="table-btn" onclick="toggleTable(7)">x 7</div>
        <div class="table-btn" onclick="toggleTable(8)">x 8</div>
        <div class="table-btn" onclick="toggleTable(9)">x 9</div>
        <div class="table-btn" onclick="toggleTable(10)">x 10</div>
    </div>
    <div class="setup-footer">
        <button class="btn-start" onclick="startGame()" id="start-btn" disabled>Commencer l entrainement</button>
        <button class="reset-btn" onclick="resetAll()">Effacer toute la progression</button>
    </div>
</div>

<!-- GAME -->
<div id="game-screen" class="hidden">

    <div id="flashcard" class="card">?</div>

    <div id="answer-display" class="answer-display empty">?</div>

    <div class="feedback" id="feedback"></div>

    <div class="numpad" id="numpad">
        <div class="num-btn" onclick="numPress(7)">7</div>
        <div class="num-btn" onclick="numPress(8)">8</div>
        <div class="num-btn" onclick="numPress(9)">9</div>
        <div class="num-btn" onclick="numPress(4)">4</div>
        <div class="num-btn" onclick="numPress(5)">5</div>
        <div class="num-btn" onclick="numPress(6)">6</div>
        <div class="num-btn" onclick="numPress(1)">1</div>
        <div class="num-btn" onclick="numPress(2)">2</div>
        <div class="num-btn" onclick="numPress(3)">3</div>
        <div class="num-btn del" onclick="numDel()">⌫</div>
        <div class="num-btn" onclick="numPress(0)">0</div>
        <div class="num-btn ok disabled" id="btn-ok" onclick="checkAnswer()">OK</div>
    </div>

    <div class="buildings">
        <div class="building" id="bld-1">
            <div class="icon">🛖</div>
            <div class="count" id="b1">0</div>
            <div class="label">Cabane</div>
        </div>
        <div class="building" id="bld-2">
            <div class="icon">🏠</div>
            <div class="count" id="b2">0</div>
            <div class="label">Maison</div>
        </div>
        <div class="building" id="bld-3">
            <div class="icon">🏯</div>
            <div class="count" id="b3">0</div>
            <div class="label">Manoir</div>
        </div>
        <div class="building" id="bld-4">
            <div class="icon">🏰</div>
            <div class="count" id="b4">0</div>
            <div class="label">Chateau</div>
        </div>
        <div class="building" id="bld-5">
            <div class="icon">👑</div>
            <div class="count" id="b5">0</div>
            <div class="label">Palais</div>
        </div>
    </div>

    <div class="game-footer">
        <button class="link-btn" onclick="backToMenu()">Changer de tables</button>
    </div>
</div>

</div>

<script>
    var deck = JSON.parse(localStorage.getItem('multipliLeitnerV3')) || [];
    var selectedTables = [];
    var currentCard = null;
    var currentInput = '';
    var inputLocked = false;

    var BOX_WEIGHTS = { 1: 8, 2: 4, 3: 2, 4: 1 };

    function toggleTable(n) {
        var idx = selectedTables.indexOf(n);
        if (idx > -1) selectedTables.splice(idx, 1);
        else selectedTables.push(n);
        renderSelectionButtons();
        document.getElementById('start-btn').disabled = selectedTables.length === 0;
    }

    function renderSelectionButtons() {
        document.querySelectorAll('.table-btn').forEach(function(btn) {
            var num = parseInt(btn.innerText.replace('x ', ''));
            btn.classList.toggle('active', selectedTables.includes(num));
        });
    }

    function startGame() {
        selectedTables.forEach(function(t) {
            for (var i = 1; i <= 10; i++) {
                if (!deck.find(function(c) { return c.a === t && c.b === i; })) {
                    deck.push({ a: t, b: i, box: 1 });
                }
            }
        });
        save();
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        nextQuestion();
    }

    function numPress(d) {
        if (inputLocked) return;
        if (currentInput.length >= 3) return;
        currentInput += String(d);
        updateAnswerDisplay();
    }

    function numDel() {
        if (inputLocked) return;
        currentInput = currentInput.slice(0, -1);
        updateAnswerDisplay();
    }

    function updateAnswerDisplay() {
        var disp = document.getElementById('answer-display');
        var ok   = document.getElementById('btn-ok');
        if (currentInput === '') {
            disp.innerText = '?';
            disp.className = 'answer-display empty';
            ok.classList.add('disabled');
        } else {
            disp.innerText = currentInput;
            disp.className = 'answer-display';
            ok.classList.remove('disabled');
        }
    }

    function save() {
        localStorage.setItem('multipliLeitnerV3', JSON.stringify(deck));
        updateUI();
    }

    function updateUI() {
        var activeDeck = deck.filter(function(c) { return selectedTables.includes(c.a); });
        for (var i = 1; i <= 5; i++) {
            var n = activeDeck.filter(function(c) { return c.box === i; }).length;
            document.getElementById('b' + i).innerText = n;
        }
        highlightBuilding(currentCard ? currentCard.box : 0);
    }

    function highlightBuilding(boxNum) {
        for (var i = 1; i <= 5; i++) {
            document.getElementById('bld-' + i).classList.remove('active');
        }
        if (boxNum >= 1 && boxNum <= 5) {
            document.getElementById('bld-' + boxNum).classList.add('active');
        }
    }

    function pulseBuilding(boxNum) {
        var bld = document.getElementById('bld-' + boxNum);
        if (!bld) return;
        bld.classList.remove('pulse');
        void bld.offsetWidth;
        bld.classList.add('pulse');
        setTimeout(function() { bld.classList.remove('pulse'); }, 420);
    }

    function nextQuestion() {
        var activeDeck = deck.filter(function(c) { return selectedTables.includes(c.a) && c.box < 5; });

        if (activeDeck.length === 0) {
            document.getElementById('flashcard').innerText = 'FINI ! ✨';
            document.getElementById('flashcard').style.fontSize = '2rem';
            document.getElementById('flashcard').className = 'card';
            document.getElementById('feedback').innerHTML = '<p class="feedback-msg correct">Toutes les tables sont au Palais !</p>';
            document.getElementById('numpad').classList.add('hidden');
            document.getElementById('answer-display').classList.add('hidden');
            highlightBuilding(5);
            return;
        }

        var weightedPool = [];
        activeDeck.forEach(function(card) {
            var w = BOX_WEIGHTS[card.box] || 1;
            for (var i = 0; i < w; i++) weightedPool.push(card);
        });
        currentCard = weightedPool[Math.floor(Math.random() * weightedPool.length)];

        inputLocked = false;
        currentInput = '';
        var flashcard = document.getElementById('flashcard');
        flashcard.innerText = currentCard.a + ' x ' + currentCard.b;
        flashcard.style.fontSize = '';
        flashcard.className = 'card';
        document.getElementById('feedback').innerHTML = '';
        document.getElementById('numpad').classList.remove('hidden');
        document.getElementById('answer-display').classList.remove('hidden');
        updateAnswerDisplay();
        updateUI();
    }

    function checkAnswer() {
        if (inputLocked) return;
        if (currentInput === '') return;

        var userAnswer = parseInt(currentInput);
        var correctAnswer = currentCard.a * currentCard.b;
        var isCorrect = userAnswer === correctAnswer;

        inputLocked = true;

        var flashcard = document.getElementById('flashcard');
        var disp = document.getElementById('answer-display');
        var feedback = document.getElementById('feedback');

        if (isCorrect) {
            flashcard.classList.add('correct');
            disp.classList.add('correct');
            feedback.innerHTML = '<p class="feedback-msg correct">✅ Bravo !</p>';
            var nextBox = Math.min(currentCard.box + 1, 5);
            flashcard.classList.add('anim-fly-right');
            setTimeout(function() {
                currentCard.box = nextBox;
                save();
                pulseBuilding(nextBox);
                setTimeout(nextQuestion, 430);
            }, 430);

        } else {
            flashcard.classList.add('wrong');
            disp.classList.add('wrong');
            flashcard.classList.add('anim-shake');
            setTimeout(function() {
                flashcard.classList.remove('anim-shake');
                feedback.innerHTML = '<p class="feedback-msg wrong">❌ Faux ! C etait <strong>' + correctAnswer + '</strong></p><button class="btn-understood" onclick="handleWrong()">OK compris</button>';
            }, 460);
        }
    }

    function handleWrong() {
        var flashcard = document.getElementById('flashcard');
        flashcard.classList.add('anim-fly-left');
        setTimeout(function() {
            currentCard.box = 1;
            save();
            pulseBuilding(1);
            setTimeout(nextQuestion, 430);
        }, 430);
    }

    function backToMenu() {
        document.getElementById('setup-screen').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        currentCard = null;
    }

    function resetAll() {
        if (confirm('Veux-tu vraiment recommencer a zero ?')) {
            localStorage.removeItem('multipliLeitnerV3');
            deck = [];
            selectedTables = [];
            currentCard = null;
            renderSelectionButtons();
            document.getElementById('start-btn').disabled = true;
        }
    }
</script>

</body>
</html>
